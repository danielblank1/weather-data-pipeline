services:
  # ============================================================
  # Kestra — Workflow Orchestration
  # ============================================================
  kestra:
    image: kestra/kestra:latest
    container_name: weather_kestra
    entrypoint: /bin/bash -c "/app/kestra server standalone"
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - kestra_data:/app/storage
      - ./kestra/flows:/app/flows
      - ./ingestion:/app/scripts/ingestion
      - duckdb_data:/data
    networks:
      - weather_net

  # ============================================================
  # Bruin — Ingestion, Transform & Quality
  # ============================================================
  bruin:
    build:
      context: ./bruin
      dockerfile: Dockerfile
    container_name: weather_bruin
    volumes:
      - ./bruin:/app/bruin
      - duckdb_data:/data
    environment:
      - BRUIN_ENV=docker
      - DUCKDB_PATH=/data/weather.duckdb
    networks:
      - weather_net

  # ============================================================
  # Streamlit — Dashboard
  # ============================================================
  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: weather_streamlit
    ports:
      - "8501:8501"
    volumes:
      - duckdb_data:/data
      - ./bruin/assets/transform:/transforms:ro
    environment:
      - DUCKDB_PATH=/data/weather.duckdb
      - TRANSFORMS_DIR=/transforms
    depends_on:
      - bruin
    networks:
      - weather_net

volumes:
  kestra_data:
  duckdb_data:

networks:
  weather_net:
    driver: bridge
