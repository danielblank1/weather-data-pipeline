# ============================================================
# Kestra Flow — Daily Weather Data Pipeline
# Orchestrates: Ingest → Bruin (transform + quality)
# ============================================================

id: weather_daily_pipeline
namespace: weather.pipeline

description: |
  End-to-end daily pipeline that:
    1. Ingests the latest year of NOAA GHCN-Daily data into DuckDB
    2. Runs Bruin pipeline (staging → marts → quality checks)

inputs:
  - id: year
    type: INT
    defaults: 2025
    description: "The year of GHCN data to ingest"

  - id: force_reingest
    type: BOOLEAN
    defaults: false
    description: "Force re-ingestion even if data already exists"

tasks:
  # ----------------------------------------------------------
  # 1. Ingest NOAA GHCN-Daily data into DuckDB
  # ----------------------------------------------------------
  - id: ingest_ghcn_data
    type: io.kestra.plugin.scripts.python.Script
    description: "Download per-station GHCN .dly files and load into DuckDB"
    docker:
      image: python:3.11-slim
      volumes:
        - weather-data-pipeline_duckdb_data:/data
    beforeCommands:
      - pip install requests pandas duckdb
    inputFiles:
      ingest_ghcn.py: "{{ read('/app/scripts/ingestion/ingest_ghcn.py') }}"
    commands:
      - >
        python ingest_ghcn.py
        --years {{ inputs.year }}
        {% if inputs.force_reingest %}--force{% endif %}
        --skip-stations-meta
    env:
      DUCKDB_PATH: "/data/weather.duckdb"

  # ----------------------------------------------------------
  # 2. Run Bruin pipeline (transforms + quality)
  # ----------------------------------------------------------
  - id: bruin_run
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Run Bruin pipeline: staging → marts → quality checks"
    docker:
      image: weather-data-pipeline-bruin
      volumes:
        - weather-data-pipeline_duckdb_data:/data
    commands:
      - bruin run /app/bruin --environment docker
    env:
      DUCKDB_PATH: "/data/weather.duckdb"

triggers:
  - id: daily_schedule
    type: io.kestra.core.models.triggers.types.Schedule
    cron: "0 6 * * *"
    inputs:
      year: "{{ now() | dateFormat('yyyy') | int }}"
      force_reingest: false
