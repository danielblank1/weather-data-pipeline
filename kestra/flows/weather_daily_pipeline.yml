# ============================================================
# Kestra Flow — Daily Weather Data Pipeline
# Orchestrates: Ingest → dbt transform → Spark batch
# ============================================================

id: weather_daily_pipeline
namespace: weather.pipeline

description: |
  End-to-end daily pipeline that:
    1. Ingests the latest year of NOAA GHCN-Daily data into PostgreSQL
    2. Runs dbt transformations (staging → marts)
    3. Triggers Spark batch processing for prediction features

inputs:
  - id: year
    type: INT
    defaults: 2025
    description: "The year of GHCN data to ingest"

  - id: force_reingest
    type: BOOLEAN
    defaults: false
    description: "Force re-ingestion even if data already exists"

tasks:
  # ----------------------------------------------------------
  # 1. Ingest NOAA GHCN-Daily data
  # ----------------------------------------------------------
  - id: ingest_ghcn_data
    type: io.kestra.plugin.scripts.python.Script
    description: "Download and load GHCN daily data into PostgreSQL"
    docker:
      image: python:3.11-slim
    beforeCommands:
      - pip install requests psycopg2-binary pandas sqlalchemy tqdm
    inputFiles:
      ingest_ghcn.py: "{{ read('/app/scripts/ingestion/ingest_ghcn.py') }}"
    commands:
      - >
        python ingest_ghcn.py
        --years {{ inputs.year }}
        {% if inputs.force_reingest %}--force{% endif %}
        --skip-stations-meta
    env:
      DATABASE_URL: "postgresql://weather:weather_pipeline_2026@postgres:5432/weather_warehouse"

  # ----------------------------------------------------------
  # 2. Run dbt transformations
  # ----------------------------------------------------------
  - id: dbt_run
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Run dbt models: staging → marts"
    docker:
      image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    commands:
      - cd /dbt/weather_dbt && dbt deps && dbt run --profiles-dir .
    env:
      DBT_PROFILES_DIR: /dbt/weather_dbt

  # ----------------------------------------------------------
  # 3. dbt tests
  # ----------------------------------------------------------
  - id: dbt_test
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Run dbt tests to validate data quality"
    docker:
      image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    commands:
      - cd /dbt/weather_dbt && dbt test --profiles-dir .

  # ----------------------------------------------------------
  # 4. Spark batch — compute prediction features
  # ----------------------------------------------------------
  - id: spark_batch_features
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Submit Spark job for weather prediction features"
    commands:
      - >
        /opt/bitnami/spark/bin/spark-submit
        --master spark://spark-master:7077
        --deploy-mode client
        /opt/spark-jobs/weather_features.py

triggers:
  # Run every day at 06:00 UTC
  - id: daily_schedule
    type: io.kestra.core.models.triggers.types.Schedule
    cron: "0 6 * * *"
    inputs:
      year: "{{ now() | dateFormat('yyyy') | int }}"
      force_reingest: false
