# ============================================================
# Kestra Flow — Historical Backfill
# Loads multiple years of GHCN data for initial setup
# ============================================================

id: weather_backfill
namespace: weather.pipeline

description: |
  One-time (or on-demand) backfill that loads multiple years of
  NOAA GHCN-Daily data and runs the full transformation pipeline.

inputs:
  - id: start_year
    type: INT
    defaults: 2015
    description: "First year to backfill"

  - id: end_year
    type: INT
    defaults: 2025
    description: "Last year to backfill (inclusive)"

tasks:
  # ----------------------------------------------------------
  # 1. Ingest station metadata
  # ----------------------------------------------------------
  - id: ingest_stations
    type: io.kestra.plugin.scripts.python.Script
    description: "Download and load GHCN station metadata"
    docker:
      image: python:3.11-slim
    beforeCommands:
      - pip install requests psycopg2-binary pandas sqlalchemy tqdm
    inputFiles:
      ingest_ghcn.py: "{{ read('/app/scripts/ingestion/ingest_ghcn.py') }}"
    commands:
      - >
        python -c "
        from ingest_ghcn import get_engine, ingest_stations;
        ingest_stations(get_engine())
        "
    env:
      DATABASE_URL: "postgresql://weather:weather_pipeline_2026@postgres:5432/weather_warehouse"

  # ----------------------------------------------------------
  # 2. Ingest historical years (loop)
  # ----------------------------------------------------------
  - id: ingest_years
    type: io.kestra.core.tasks.flows.EachSequential
    description: "Loop through each year and ingest"
    value: "{{ range(inputs.start_year, inputs.end_year + 1) }}"
    tasks:
      - id: ingest_single_year
        type: io.kestra.plugin.scripts.python.Script
        docker:
          image: python:3.11-slim
        beforeCommands:
          - pip install requests psycopg2-binary pandas sqlalchemy tqdm
        inputFiles:
          ingest_ghcn.py: "{{ read('/app/scripts/ingestion/ingest_ghcn.py') }}"
        commands:
          - "python ingest_ghcn.py --years {{ taskrun.value }} --skip-stations-meta"
        env:
          DATABASE_URL: "postgresql://weather:weather_pipeline_2026@postgres:5432/weather_warehouse"

  # ----------------------------------------------------------
  # 3. Run full dbt pipeline
  # ----------------------------------------------------------
  - id: dbt_run
    type: io.kestra.plugin.scripts.shell.Commands
    docker:
      image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    commands:
      - cd /dbt/weather_dbt && dbt deps && dbt run --full-refresh --profiles-dir .

  # ----------------------------------------------------------
  # 4. Run Spark batch on full history
  # ----------------------------------------------------------
  - id: spark_full_features
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - >
        /opt/bitnami/spark/bin/spark-submit
        --master spark://spark-master:7077
        --deploy-mode client
        /opt/spark-jobs/weather_features.py
        --full-history
