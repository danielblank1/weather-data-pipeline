# ============================================================
# Kestra Flow — Historical Backfill
# Loads multiple years of GHCN data then runs Bruin pipeline
# ============================================================

id: weather_backfill
namespace: weather.pipeline

description: |
  One-time (or on-demand) backfill that loads multiple years of
  NOAA GHCN-Daily data and runs the full Bruin pipeline.

inputs:
  - id: start_year
    type: INT
    defaults: 2015
    description: "First year to backfill"

  - id: end_year
    type: INT
    defaults: 2025
    description: "Last year to backfill (inclusive)"

tasks:
  # ----------------------------------------------------------
  # 1. Ingest station metadata
  # ----------------------------------------------------------
  - id: ingest_stations
    type: io.kestra.plugin.scripts.python.Script
    description: "Download and load GHCN station metadata into DuckDB"
    docker:
      image: python:3.11-slim
      volumes:
        - weather-data-pipeline_duckdb_data:/data
    beforeCommands:
      - pip install requests pandas duckdb
    inputFiles:
      ingest_ghcn.py: "{{ read('/app/scripts/ingestion/ingest_ghcn.py') }}"
    commands:
      - python -c "
          import sys; sys.argv = ['ingest_ghcn.py', '--years', '2025', '--skip-stations-meta'];
          exec(open('ingest_ghcn.py').read().replace('if __name__', 'if True'))
        "
    env:
      DUCKDB_PATH: "/data/weather.duckdb"

  # ----------------------------------------------------------
  # 2. Ingest historical years (loop)
  # ----------------------------------------------------------
  - id: ingest_years
    type: io.kestra.core.tasks.flows.EachSequential
    description: "Loop through each year and ingest"
    value: "{{ range(inputs.start_year, inputs.end_year + 1) }}"
    tasks:
      - id: ingest_single_year
        type: io.kestra.plugin.scripts.python.Script
        docker:
          image: python:3.11-slim
          volumes:
            - weather-data-pipeline_duckdb_data:/data
        beforeCommands:
          - pip install requests pandas duckdb
        inputFiles:
          ingest_ghcn.py: "{{ read('/app/scripts/ingestion/ingest_ghcn.py') }}"
        commands:
          - "python ingest_ghcn.py --years {{ taskrun.value }} --skip-stations-meta"
        env:
          DUCKDB_PATH: "/data/weather.duckdb"

  # ----------------------------------------------------------
  # 3. Run full Bruin pipeline
  # ----------------------------------------------------------
  - id: bruin_run
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Run Bruin: staging → marts → quality checks"
    docker:
      image: weather-data-pipeline-bruin
      volumes:
        - weather-data-pipeline_duckdb_data:/data
    commands:
      - bruin run /app/bruin --environment docker --full-refresh
    env:
      DUCKDB_PATH: "/data/weather.duckdb"
