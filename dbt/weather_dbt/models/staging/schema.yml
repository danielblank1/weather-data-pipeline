version: 2

models:
  - name: stg_daily_observations
    description: >
      Pivoted and unit-converted daily weather observations.
      One row per station per day, with columns for each weather element.
    columns:
      - name: station_id
        tests:
          - not_null
      - name: obs_date
        tests:
          - not_null
      - name: tmax_celsius
        description: "Maximum temperature in °C"
      - name: tmin_celsius
        description: "Minimum temperature in °C"
      - name: precipitation_mm
        description: "Total precipitation in mm"

  - name: stg_stations
    description: >
      Cleaned station metadata with geographic enrichment
      (country code, hemisphere, climate zone).
    columns:
      - name: station_id
        tests:
          - unique
          - not_null
      - name: latitude
        tests:
          - not_null
      - name: longitude
        tests:
          - not_null
