version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw NOAA GHCN-Daily data loaded by the ingestion pipeline"
    tables:
      - name: ghcn_daily
        description: "Daily weather observations from NOAA GHCN"
        columns:
          - name: station_id
            description: "11-character GHCN station ID"
            tests:
              - not_null
          - name: obs_date
            description: "Date of observation"
            tests:
              - not_null
          - name: element
            description: "Observation element type (TMAX, TMIN, PRCP, etc.)"
            tests:
              - not_null
              - accepted_values:
                  values: ["TMAX", "TMIN", "PRCP", "SNOW", "SNWD", "AWND", "TAVG"]
          - name: data_value
            description: "Observation value (tenths of °C or mm)"

      - name: ghcn_stations
        description: "GHCN station metadata (location, name, etc.)"
        columns:
          - name: station_id
            description: "11-character GHCN station ID"
            tests:
              - unique
              - not_null
